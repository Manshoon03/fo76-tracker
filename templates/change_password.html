{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}

<div class="page-header">
  <h1>🔒 ACCOUNT</h1>
</div>

<div style="max-width:400px">
  <div class="section-title" style="margin-bottom:14px">CHANGE CREDENTIALS</div>

  <form method="POST" action="/change-password">
    <div class="form-grid" style="grid-template-columns:1fr">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" value="{{ current_user }}" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Current Password *</label>
        <input type="password" name="current_password" required autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>New Password *</label>
        <input type="password" name="new_password" required minlength="4" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm New Password *</label>
        <input type="password" name="confirm_password" required autocomplete="new-password">
      </div>
    </div>
    <div class="form-actions" style="margin-top:8px">
      <button class="btn btn-primary" type="submit">Save Changes</button>
      <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
  </form>

  <p class="dim" style="font-size:11px;margin-top:16px">
    Saving will log you out and require you to sign in again with the new credentials.
  </p>
</div>

{% endblock %}
