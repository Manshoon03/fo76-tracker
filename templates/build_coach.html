{% extends 'base.html' %}
{% block title %}Build Coach{% endblock %}
{% block content %}

<style>
  .bc-wrap       { max-width:960px; margin:0 auto; }
  .bc-header     { display:flex; align-items:baseline; gap:12px; margin-bottom:20px; }
  .bc-header h1  { font-size:20px; color:var(--accent); margin:0; }
  .bc-header span{ font-size:12px; color:var(--text-dim); }

  /* Build picker */
  .bc-picker     { background:var(--bg-card); border:1px solid var(--border);
                   border-radius:8px; padding:18px; margin-bottom:16px; }
  .bc-picker h2  { font-size:12px; color:var(--text-dim); text-transform:uppercase;
                   letter-spacing:.06em; margin:0 0 14px; }
  .bc-pick-row   { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; }
  .bc-pick-row > div { flex:1; min-width:200px; }
  .bc-pick-row label { font-size:11px; color:var(--text-dim); display:block; margin-bottom:4px;
                       text-transform:uppercase; letter-spacing:.05em; }
  .bc-pick-row select{ width:100%; }

  /* Build snapshot */
  .bc-snapshot   { display:grid; grid-template-columns:repeat(7,1fr) auto; gap:6px;
                   background:var(--bg-main,#111); border-radius:6px; padding:10px 12px;
                   margin-top:12px; display:none; }
  .bc-snap-sp    { text-align:center; }
  .bc-snap-lbl   { font-size:9px; font-weight:700; letter-spacing:.04em; }
  .bc-snap-val   { font-size:18px; font-weight:700; line-height:1.1; }
  .bcs-s .bc-snap-lbl,.bcs-s .bc-snap-val{color:#e05050}
  .bcs-p .bc-snap-lbl,.bcs-p .bc-snap-val{color:#e08040}
  .bcs-e .bc-snap-lbl,.bcs-e .bc-snap-val{color:#50c050}
  .bcs-c .bc-snap-lbl,.bcs-c .bc-snap-val{color:#e0c040}
  .bcs-i .bc-snap-lbl,.bcs-i .bc-snap-val{color:#4090e0}
  .bcs-a .bc-snap-lbl,.bcs-a .bc-snap-val{color:#40c0c0}
  .bcs-l .bc-snap-lbl,.bcs-l .bc-snap-val{color:#c040e0}
  .bcs-t .bc-snap-lbl{color:var(--text-dim)} .bcs-t .bc-snap-val{font-size:14px;color:var(--text)}

  /* Results */
  .bc-results    { display:none; }
  .bc-results.show { display:block; }

  /* Rating badge */
  .bc-rating-wrap{ display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .bc-rating-num { font-size:36px; font-weight:700; line-height:1; }
  .bc-rating-bar { flex:1; height:8px; background:var(--bg-main,#111);
                   border-radius:4px; overflow:hidden; }
  .bc-rating-fill{ height:100%; border-radius:4px; transition:width .5s; }
  .bc-assess     { background:var(--bg-main,#111); border-left:3px solid var(--accent);
                   border-radius:0 6px 6px 0; padding:10px 14px; margin-bottom:20px;
                   font-size:13px; color:var(--text-muted); line-height:1.7; }

  /* Sections */
  .bc-section    { font-size:11px; color:var(--text-dim); text-transform:uppercase;
                   letter-spacing:.06em; margin:0 0 10px; }

  /* Change cards */
  .bc-changes    { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
  .bc-change     { background:var(--bg-main,#111); border-radius:6px; padding:10px 12px;
                   display:flex; gap:10px; align-items:flex-start;
                   border:1px solid var(--border); }
  .bc-chg-icon   { font-size:16px; flex-shrink:0; margin-top:1px; }
  .bc-chg-name   { font-size:13px; font-weight:700; color:#eef2ff; margin-bottom:3px; }
  .bc-chg-detail { font-size:12px; color:var(--text-dim); margin-bottom:3px; }
  .bc-chg-reason { font-size:12px; color:var(--text-muted); line-height:1.5; }
  .chg-add       { border-left:3px solid #50c050; }
  .chg-remove    { border-left:3px solid #e05050; }
  .chg-rank      { border-left:3px solid #e0c040; }
  .chg-stat      { border-left:3px solid #4090e0; }
  .chg-mut       { border-left:3px solid #c040e0; }

  /* Priority box */
  .bc-priority   { background:#1a380022; border:1px solid #50c05033;
                   border-radius:6px; padding:12px 16px; margin-bottom:20px; }
  .bc-priority h3{ font-size:11px; color:#80d080; text-transform:uppercase;
                   letter-spacing:.06em; margin:0 0 8px; }
  .bc-priority p { margin:0; font-size:13px; color:#a0e0a0; line-height:1.6; }

  /* Legendary targets */
  .bc-leg-targets{ background:var(--bg-main,#111); border:1px solid #e0c04033;
                   border-radius:6px; padding:12px 14px; margin-bottom:20px; }
  .bc-leg-targets h3 { font-size:11px; color:#e0c040; text-transform:uppercase;
                       letter-spacing:.06em; margin:0 0 8px; }
  .bc-leg-targets p  { margin:0; font-size:13px; color:var(--text-muted); line-height:1.6; }

  .gen-btn   { display:flex; gap:10px; align-items:center; }
  .gen-status{ font-size:12px; color:var(--text-dim); }

  /* No builds state */
  .bc-no-builds { text-align:center; padding:40px; color:var(--text-dim); font-size:13px; }
  .bc-no-builds a { color:var(--accent); }

  @media(max-width:640px) {
    .bc-snap-val { font-size:14px; }
  }
</style>

<div class="bc-wrap">
  <div class="bc-header">
    <h1>🎯 Build Coach</h1>
    <span>AI-powered analysis — Claude Haiku</span>
  </div>

  {% if not builds %}
  <div class="bc-no-builds">
    No builds saved yet. <a href="/build-generator">Generate a build</a> or <a href="/builds">add one manually</a>.
  </div>
  {% else %}

  <!-- Build picker -->
  <div class="bc-picker">
    <h2>Select a Build to Coach</h2>
    <div class="bc-pick-row">
      <div>
        <label>Build</label>
        <select id="bc-build-sel" onchange="onBuildSelect(this.value)">
          <option value="">— Select a build —</option>
          {% for b in builds %}
          <option value="{{ b.id }}">{{ b.name }} — {{ b.playstyle or 'No playstyle' }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="gen-btn" style="padding-bottom:0">
        <button class="btn btn-primary" id="bc-btn" onclick="analyze()" disabled>Analyze Build</button>
        <span class="gen-status" id="bc-status"></span>
      </div>
    </div>
    <!-- SPECIAL snapshot -->
    <div class="bc-snapshot" id="bc-snapshot"></div>
  </div>

  <!-- Results -->
  <div class="bc-results" id="bc-results"></div>

  {% endif %}
</div>

<script>
const BUILDS_DATA = {{ builds | tojson }};

function onBuildSelect(id) {
  document.getElementById('bc-btn').disabled = !id;
  const snap = document.getElementById('bc-snapshot');
  if (!id) { snap.style.display = 'none'; return; }
  const b = BUILDS_DATA.find(x => x.id == id);
  if (!b) return;
  const sp = [
    ['S','s','bcs-s'],['P','p','bcs-p'],['E','e','bcs-e'],['C','c','bcs-c'],
    ['I','i','bcs-i'],['A','a','bcs-a'],['L','l','bcs-l'],
  ];
  const total = sp.reduce((a,[,k]) => a + (b[k]||0), 0);
  snap.innerHTML = sp.map(([lbl,k,cls]) =>
    `<div class="bc-snap-sp ${cls}">
      <div class="bc-snap-lbl">${lbl}</div>
      <div class="bc-snap-val">${b[k]||1}</div>
    </div>`
  ).join('') + `<div class="bc-snap-sp bcs-t">
    <div class="bc-snap-lbl">TOT</div>
    <div class="bc-snap-val">${total}</div>
  </div>`;
  snap.style.display = 'grid';
}

async function analyze() {
  const btn = document.getElementById('bc-btn');
  const st  = document.getElementById('bc-status');
  const id  = document.getElementById('bc-build-sel').value;
  if (!id) return;
  btn.disabled = true;
  st.textContent = 'Analyzing... (~12s)';

  try {
    const r = await fetch('/build-coach/analyze', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({build_id: parseInt(id)})
    });
    const data = await r.json();
    if (!data.success) throw new Error(data.error);
    renderCoach(data.result, data.build);
    st.textContent = 'Done!';
    setTimeout(() => st.textContent = '', 3000);
  } catch(e) {
    st.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

function renderCoach(res, build) {
  const rating  = Math.min(10, Math.max(1, parseInt(res.rating) || 5));
  const rcolor  = rating >= 8 ? '#50c050' : rating >= 5 ? '#e0c040' : '#e05050';
  const rwidth  = (rating / 10 * 100) + '%';

  // SPECIAL changes
  const spChanges = (res.special_suggestions || []).map(s =>
    `<div class="bc-change chg-stat">
      <span class="bc-chg-icon">📊</span>
      <div>
        <div class="bc-chg-name">${s.stat}</div>
        <div class="bc-chg-detail">${s.current} → <strong>${s.suggested}</strong></div>
        <div class="bc-chg-reason">${s.reason}</div>
      </div>
    </div>`
  ).join('');

  // Perk changes
  const ICONS = {add:'➕', remove:'➖', change_rank:'✏️'};
  const CLASSES = {add:'chg-add', remove:'chg-remove', change_rank:'chg-rank'};
  const perkChanges = (res.perk_changes || []).map(p => {
    let detail = '';
    if (p.action === 'add')         detail = `Add at Rank ${p.rank || 1} (${p.special || '?'})`;
    if (p.action === 'remove')      detail = 'Remove from build';
    if (p.action === 'change_rank') detail = `Rank ${p.from_rank} → Rank ${p.to_rank}`;
    return `<div class="bc-change ${CLASSES[p.action]||''}">
      <span class="bc-chg-icon">${ICONS[p.action]||'•'}</span>
      <div>
        <div class="bc-chg-name">${p.name}</div>
        <div class="bc-chg-detail">${detail}</div>
        <div class="bc-chg-reason">${p.reason}</div>
      </div>
    </div>`;
  }).join('');

  // Mutation suggestions
  const mutChanges = (res.mutation_suggestions || []).map(m =>
    `<div class="bc-change chg-mut">
      <span class="bc-chg-icon">🧬</span>
      <div>
        <div class="bc-chg-name">${m.name}</div>
        <div class="bc-chg-detail">${m.action === 'add' ? 'Add mutation' : 'Remove mutation'}</div>
        <div class="bc-chg-reason">${m.reason}</div>
      </div>
    </div>`
  ).join('');

  const hasChanges = spChanges || perkChanges || mutChanges;

  document.getElementById('bc-results').innerHTML = `
    <!-- Rating -->
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:16px">
      <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">
        Build Assessment — ${build.name}
      </div>
      <div class="bc-rating-wrap">
        <div class="bc-rating-num" style="color:${rcolor}">${rating}/10</div>
        <div class="bc-rating-bar">
          <div class="bc-rating-fill" style="width:${rwidth};background:${rcolor}"></div>
        </div>
      </div>
      <div class="bc-assess">${res.assessment || ''}</div>
    </div>

    <!-- Priority -->
    ${res.priority ? `<div class="bc-priority">
      <h3>⚡ Top Priority</h3>
      <p>${res.priority}</p>
    </div>` : ''}

    <!-- Legendary targets -->
    ${res.legendary_targets ? `<div class="bc-leg-targets">
      <h3>⭐ Legendary Mod Targets</h3>
      <p>${res.legendary_targets}</p>
    </div>` : ''}

    <!-- Changes -->
    ${hasChanges ? `
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:18px">
      ${spChanges ? `<div class="bc-section">SPECIAL Adjustments</div>
        <div class="bc-changes">${spChanges}</div>` : ''}
      ${perkChanges ? `<div class="bc-section">Perk Card Changes</div>
        <div class="bc-changes">${perkChanges}</div>` : ''}
      ${mutChanges ? `<div class="bc-section">Mutation Changes</div>
        <div class="bc-changes">${mutChanges}</div>` : ''}
    </div>` : '<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:20px">No specific changes suggested — build is well optimized.</div>'}
  `;
  document.getElementById('bc-results').classList.add('show');
  document.getElementById('bc-results').scrollIntoView({behavior:'smooth', block:'start'});
}
</script>

{% endblock %}
